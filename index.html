<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>多台持ち最適化</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'Hiragino Sans',sans-serif;background:#0f0f0f;color:#eee;min-height:100vh;padding-bottom:20px}

/* Settings */
details{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;margin:8px;overflow:hidden}
summary{padding:11px 14px;cursor:pointer;font-size:13px;color:#888;user-select:none;list-style:none}
summary::-webkit-details-marker{display:none}
summary::before{content:'⚙ 設定  ▸';letter-spacing:1px}
details[open] summary::before{content:'⚙ 設定  ▾'}
.cfg-wrap{padding:6px 14px 14px}

.cfg-section{margin-bottom:10px}
.cfg-label{font-size:11px;color:#666;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}

/* Tabs */
.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tab{padding:5px 13px;border-radius:5px;border:1px solid #333;background:#1a1a1a;color:#777;cursor:pointer;font-size:13px;transition:all 0.15s}
.tab.on{background:#1d4ed8;border-color:#1d4ed8;color:#fff}
.tab:hover:not(.on){background:#252525;color:#bbb}

/* Machine/auto config cards */
.mcfg{background:#141414;border:1px solid #252525;border-radius:7px;padding:10px;margin:6px 0}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;margin-bottom:4px}
.fld label{font-size:11px;color:#666;display:block;margin-bottom:3px}
.fld input[type=text]{background:#1e1e1e;border:1px solid #333;border-radius:4px;color:#ddd;padding:5px 7px;font-size:13px;width:80px}
.fld input[type=number]{background:#1e1e1e;border:1px solid #333;border-radius:4px;color:#ddd;padding:5px 7px;font-size:13px;width:54px}
.fld input:focus{outline:none;border-color:#1d4ed8}

.chk-row{display:flex;align-items:center;gap:7px;margin-top:7px}
.chk-row input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#7c3aed}
.chk-row label{font-size:12px;color:#999;cursor:pointer}
.opt-detail{margin-top:7px;padding:8px;background:#0f0f0f;border-radius:5px;border:1px solid #1e1e3f}

/* Recommendation banner */
#rec{border-radius:10px;margin:8px;padding:14px 16px;transition:background 0.3s,border-color 0.3s}
.rec-idle{background:#1a1a1a;border:1px solid #252525}
.rec-green{background:#0d2b0d;border:1px solid #16a34a}
.rec-yellow{background:#2b1e0a;border:1px solid #d97706}
.rec-red{background:#2b0d0d;border:1px solid #dc2626}
.rec-blue{background:#0d1a2b;border:1px solid #2563eb}
#rec-eyebrow{font-size:11px;color:#777;margin-bottom:4px;letter-spacing:0.3px}
.rec-green #rec-eyebrow{color:#4ade80}
.rec-yellow #rec-eyebrow{color:#fbbf24}
.rec-red #rec-eyebrow{color:#f87171}
.rec-blue #rec-eyebrow{color:#93c5fd}
#rec-main{font-size:20px;font-weight:800;line-height:1.2}
#rec-sub{font-size:12px;color:#666;margin-top:4px}
.rec-green #rec-sub,.rec-yellow #rec-sub{color:#888}

/* Machine cards */
#cards{display:grid;gap:8px;padding:8px}
.card{background:#161616;border:2px solid #222;border-radius:11px;padding:12px 13px;transition:border-color 0.3s}

.st-idle .card{border-color:#222}
.st-running .card{border-color:#1d4ed8}
.st-alert .card{border-color:#d97706;animation:pulse 0.9s ease-in-out infinite}
.st-opt_pause .card{border-color:#7c3aed}
.st-ready .card{border-color:#16a34a;animation:pulse 0.6s ease-in-out infinite}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}

.card-name{font-size:12px;font-weight:700;color:#888;margin-bottom:5px;letter-spacing:0.3px}
.card-timer{font-size:32px;font-weight:900;letter-spacing:-1px;font-variant-numeric:tabular-nums;line-height:1}
#cards.cols3 .card{padding:10px 11px}
#cards.cols3 .card-timer{font-size:24px}
#cards.cols3 .card-name{font-size:11px}

.st-idle .card-timer{color:#333}
.st-running .card-timer{color:#3b82f6}
.st-alert .card-timer{color:#f59e0b}
.st-opt_pause .card-timer{color:#a78bfa}
.st-ready .card-timer{color:#4ade80}

.card-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:9px;margin-top:5px;letter-spacing:0.3px}
.b-idle{background:#1e1e1e;color:#444}
.b-running{background:#1e3a6e;color:#60a5fa}
.b-alert{background:#7c3a00;color:#fcd34d}
.b-opt_pause{background:#4c1d95;color:#c4b5fd}
.b-ready{background:#14532d;color:#86efac}

.bar-wrap{margin:8px 0 6px;height:5px;background:#1e1e1e;border-radius:3px;overflow:hidden}
.bar{height:100%;border-radius:3px;transition:width 0.2s linear}
.st-idle .bar{background:#222;width:100%}
.st-running .bar{background:#2563eb}
.st-alert .bar{background:#d97706}
.st-opt_pause .bar{background:#7c3aed}
.st-ready .bar{background:#16a34a;width:100%!important}

.btn-area{margin-top:6px}
.btn{width:100%;padding:10px;border-radius:7px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:opacity 0.15s;letter-spacing:0.3px}
.btn:active{opacity:0.8}
.btn-go{background:#16a34a;color:#fff}
.btn-restart{background:#b91c1c;color:#fff}
.btn-resume{background:#6d28d9;color:#fff}
.btn-dis{background:#1e1e1e;color:#333;cursor:default}

/* Auto machine strip */
#auto-wrap{padding:0 8px}
#auto-strip{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* Role gate */
#roleGate{position:fixed;inset:0;background:#0f0f0f;z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
#roleGate h2{font-size:18px;margin-bottom:18px;color:#eee}
#roleGate .roleGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:380px}
#roleGate .roleBtn{padding:16px;border-radius:10px;border:1px solid #2a2a2a;background:#1a1a1a;color:#ddd;font-size:15px;font-weight:700;cursor:pointer}
#roleGate .roleBtn:active{background:#252525}
#roleGate .roleBtn.engineBtn{grid-column:1/-1;background:#1d4ed8;border-color:#1d4ed8;color:#fff}
#roleGate .hint{margin-top:16px;font-size:12px;color:#666;max-width:340px;line-height:1.6}

/* Viewer mode */
#viewerView{padding:8px}
.viewer-card.card{padding:20px;border-radius:14px}
.viewer-card .card-name{font-size:16px;margin-bottom:8px}
.viewer-card .card-timer{font-size:64px}
.viewer-card .card-badge{font-size:13px;padding:4px 12px;margin-top:8px}
.viewer-card .bar-wrap{margin:14px 0 10px;height:7px}
.viewer-card .btn-area{margin-top:14px}
.viewer-card .btn{padding:16px;font-size:17px}

.recbox{border-radius:10px;margin:8px;padding:14px 16px;transition:background 0.3s,border-color 0.3s}
.recbox .reb-eyebrow{font-size:11px;color:#777;margin-bottom:4px;letter-spacing:0.3px}
.rec-green .reb-eyebrow{color:#4ade80}
.rec-yellow .reb-eyebrow{color:#fbbf24}
.rec-red .reb-eyebrow{color:#f87171}
.rec-blue .reb-eyebrow{color:#93c5fd}
.recbox .reb-main{font-size:22px;font-weight:800;line-height:1.3}
.recbox .reb-sub{font-size:12px;color:#666;margin-top:4px}
.rec-green .reb-sub,.rec-yellow .reb-sub{color:#888}
.recbox.you{box-shadow:0 0 0 2px #f59e0b inset}

#connBadge{position:fixed;top:8px;right:8px;font-size:10px;padding:3px 8px;border-radius:8px;background:#1a1a1a;color:#666;border:1px solid #2a2a2a;z-index:9999}
#connBadge.on{color:#4ade80;border-color:#16a34a}
#connBadge.off{color:#f87171;border-color:#dc2626}

.switchRole{display:block;width:100%;text-align:center;margin:0;padding:9px;border-radius:8px;border:1px solid #2a2a2a;background:#161616;color:#666;font-size:12px;cursor:pointer}
</style>
</head>

<script>
// ── Config ──────────────────────────────────────────────
const MC = [
  {name:'1号機', runMin:3, runSec:17, daT:20, travel:15, optOn:false, finMin:0, finSec:48, airT:15},
  {name:'2号機', runMin:3, runSec:50, daT:20, travel:15, optOn:true,  finMin:0, finSec:48, airT:15},
  {name:'3号機', runMin:1, runSec:17, daT:20, travel:15, optOn:false, finMin:0, finSec:48, airT:15},
  {name:'4号機', runMin:2, runSec:0,  daT:20, travel:15, optOn:false, finMin:0, finSec:48, airT:15},
  {name:'5号機', runMin:2, runSec:0,  daT:20, travel:15, optOn:false, finMin:0, finSec:48, airT:15},
  {name:'6号機', runMin:2, runSec:0,  daT:20, travel:15, optOn:false, finMin:0, finSec:48, airT:15},
]
const AC = [
  {name:'自動盤A', intMin:40, travel:15},
  {name:'自動盤B', intMin:40, travel:15},
]
let numM = 3, numA = 0

// ── Cloud sync (optional, for multi-device mode) ─────────
const FB_CONFIG = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
}
const FB_ENABLED = !!(FB_CONFIG.apiKey && FB_CONFIG.apiKey !== "YOUR_API_KEY" && FB_CONFIG.databaseURL)
let db = null
let lastRec = {cls:'rec-idle', eyebrow:'次のアクション', main:'起動ボタンを押してください', sub:'', target:null}

// ── Runtime state ────────────────────────────────────────
const MS = MC.map(c => ({state:'idle', rem:c.runMin*60+c.runSec, _od:false}))
const AS = AC.map(c => ({rem:c.intMin*60}))
const prevSt = ['','','','','','']
let last = Date.now()

// ── Helpers ──────────────────────────────────────────────
const rT = i => MC[i].runMin*60 + MC[i].runSec
const fT = i => MC[i].finMin*60 + MC[i].finSec
const sT = i => MC[i].travel + MC[i].daT   // total service time

function fmt(s) {
  s = Math.max(0, Math.ceil(s))
  const m = Math.floor(s/60), sec = s % 60
  return m + ':' + (sec < 10 ? '0' : '') + sec
}

// ── Build static card DOM ─────────────────────────────────
function buildCards() {
  const cont = document.getElementById('cards')
  cont.innerHTML = ''
  cont.style.gridTemplateColumns = (numM === 1) ? '1fr' : (numM === 2) ? '1fr 1fr' : '1fr 1fr 1fr'
  cont.classList.toggle('cols3', numM >= 3)
  for (let i = 0; i < numM; i++) {
    const w = document.createElement('div')
    w.id = 'cw' + i
    w.className = 'st-idle'
    w.innerHTML = `<div class="card">
      <div class="card-name" id="cname${i}">${MC[i].name}</div>
      <div class="card-timer" id="ctimer${i}">--:--</div>
      <div><span class="card-badge b-idle" id="cbadge${i}">停止中</span></div>
      <div class="bar-wrap"><div class="bar" id="cbar${i}" style="width:0%"></div></div>
      <div class="btn-area" id="btn${i}"><button class="btn btn-go" onclick="doStart(${i})">起動</button></div>
    </div>`
    cont.appendChild(w)
    prevSt[i] = 'idle'
  }
}

function buildAutoCards() {
  const strip = document.getElementById('auto-strip')
  strip.innerHTML = ''
  for (let i = 0; i < numA; i++) {
    const w = document.createElement('div')
    w.id = 'aw' + i
    w.className = 'st-running'
    w.innerHTML = `<div class="card">
      <div class="card-name" id="aname${i}">${AC[i].name}</div>
      <div class="card-timer" id="atimer${i}">${fmt(AS[i].rem)}</div>
      <div><span class="card-badge b-running" id="abadge${i}">次回確認まで</span></div>
      <div class="bar-wrap"><div class="bar" id="abar${i}" style="width:0%"></div></div>
      <div class="btn-area"><button class="btn btn-go" id="abtn${i}" onclick="doCheck(${i})">確認完了</button></div>
    </div>`
    strip.appendChild(w)
  }
}

// ── Apply card (DOM update each tick) ────────────────────
const BADGE = {
  idle:      ['停止中',     'b-idle'],
  running:   ['加工中',     'b-running'],
  alert:     ['もうすぐ停止','b-alert'],
  opt_pause: ['一時停止中', 'b-opt_pause'],
  ready:     ['脱着待ち',   'b-ready'],
}

function applyCard(i) {
  const s = MS[i], c = MC[i]
  const wrap = document.getElementById('cw' + i)
  if (!wrap) return

  wrap.className = 'st-' + s.state
  document.getElementById('cname' + i).textContent = c.name
  document.getElementById('ctimer' + i).textContent = (s.state === 'idle') ? '--:--' : fmt(s.rem)

  const [bl, bc] = BADGE[s.state] || ['', '']
  const badge = document.getElementById('cbadge' + i)
  badge.textContent = bl
  badge.className = 'card-badge ' + bc

  const full = rT(i)
  const pct = (s.state === 'idle') ? 0 : (s.rem / full) * 100
  document.getElementById('cbar' + i).style.width = Math.max(0, Math.min(100, pct)) + '%'

  // Button - rebuild only on state change
  if (s.state !== prevSt[i]) {
    prevSt[i] = s.state
    const ba = document.getElementById('btn' + i)
    if (s.state === 'idle') {
      ba.innerHTML = `<button class="btn btn-go" onclick="doStart(${i})">起動</button>`
    } else if (s.state === 'running' || s.state === 'alert') {
      ba.innerHTML = `<button class="btn btn-dis" disabled>加工中</button>`
    } else if (s.state === 'opt_pause') {
      ba.innerHTML = `<button class="btn btn-resume" onclick="doStart(${i})">起動（仕上げ再開）</button>`
    } else if (s.state === 'ready') {
      ba.innerHTML = `<button class="btn btn-restart" onclick="doStart(${i})">起動（脱着完了後）</button>`
    }
  }
}

function applyAutoCard(i) {
  const a = AS[i], c = AC[i]
  const wrap = document.getElementById('aw' + i)
  if (!wrap) return
  const isDue = a.rem <= 0
  const total = c.intMin * 60
  wrap.className = isDue ? 'st-alert' : 'st-running'
  document.getElementById('aname' + i).textContent = c.name
  document.getElementById('atimer' + i).textContent = isDue ? '確認してください' : fmt(a.rem)
  const badge = document.getElementById('abadge' + i)
  badge.textContent = isDue ? '要確認!' : '次回確認まで'
  badge.className = 'card-badge ' + (isDue ? 'b-alert' : 'b-running')
  document.getElementById('abar' + i).style.width = Math.min(100, Math.max(0, (1 - a.rem / total) * 100)) + '%'
  document.getElementById('abtn' + i).className = 'btn ' + (isDue ? 'btn-restart' : 'btn-go')
}

// ── Actions ───────────────────────────────────────────────
function doStart(i) {
  const s = MS[i], c = MC[i]
  if (s.state === 'idle' || s.state === 'ready') {
    s.state = 'running'
    s.rem = rT(i)
    s._od = false
  } else if (s.state === 'opt_pause') {
    // After air blow: resume with remaining time
    s.state = (s.rem <= sT(i)) ? 'alert' : 'running'
  }
  prevSt[i] = '' // force button rebuild
  applyCard(i)
  updateRec()
}

function doCheck(i) {
  AS[i].rem = AC[i].intMin * 60
  applyAutoCard(i)
  updateRec()
}

function resetMachine(i) {
  MS[i].state = 'idle'
  MS[i].rem = rT(i)
  MS[i]._od = false
  prevSt[i] = ''
  applyCard(i)
  updateRec()
}

// ── Settings ──────────────────────────────────────────────
function setNumM(n) {
  numM = n
  document.querySelectorAll('#tabsM .tab').forEach((b, i) => b.classList.toggle('on', i + 1 === n))
  for (let i = 0; i < 6; i++) {
    const e = document.getElementById('mcfg' + i)
    if (e) e.style.display = i < n ? 'block' : 'none'
  }
  buildCards()
  updateRec()
}

function setNumA(n) {
  numA = n
  document.querySelectorAll('#tabsA .tab').forEach((b, i) => b.classList.toggle('on', i === n))
  for (let i = 0; i < 2; i++) {
    const e = document.getElementById('acfg' + i)
    if (e) e.style.display = i < n ? 'block' : 'none'
  }
  buildAutoCards()
  updateRec()
}

function toggleOpt(i) {
  const sec = document.getElementById('optSec' + i)
  if (sec) sec.style.display = MC[i].optOn ? 'block' : 'none'
  if (!MC[i].optOn && MS[i].state === 'opt_pause') {
    MS[i].state = 'running'
  }
  MS[i]._od = false
  prevSt[i] = ''
  applyCard(i)
  updateRec()
}

// ── Recommendation logic ──────────────────────────────────
function setRec(cls, eyebrow, main, sub, target) {
  lastRec = {cls, eyebrow, main, sub, target: target || null}
  const recEl = document.getElementById('rec')
  recEl.className = cls
  document.getElementById('rec-eyebrow').textContent = eyebrow
  document.getElementById('rec-main').textContent = main
  document.getElementById('rec-sub').textContent = sub
}

function updateRec() {
  // 1) Ready / opt_pause → immediate action
  const actNow = []
  for (let i = 0; i < numM; i++) {
    if (MS[i].state === 'ready' || MS[i].state === 'opt_pause') {
      actNow.push({i, state: MS[i].state, name: MC[i].name})
    }
  }
  // Auto due
  for (let i = 0; i < numA; i++) {
    if (AS[i].rem <= 0) actNow.push({i, state:'auto_due', name: AC[i].name})
  }

  if (actNow.length > 0) {
    const r = actNow[0]
    let m
    if (r.state === 'ready')    m = r.name + ' → 脱着して起動してください'
    else if (r.state === 'opt_pause') m = r.name + ' → エアブロー後に起動してください'
    else m = r.name + ' → 確認してください'
    const s = actNow.length > 1 ? `他に ${actNow.length - 1} 台が待機中` : ''
    const tType = (r.state === 'auto_due') ? 'a' : 'm'
    setRec('rec-red', '🔴 今すぐ対応', m, s, {type: tType, i: r.i})
    return
  }

  // 2) Build candidate list (running/alert NC + auto machines)
  const cands = []

  for (let i = 0; i < numM; i++) {
    const s = MS[i], c = MC[i]
    if (!['running', 'alert'].includes(s.state)) continue

    // Leave time for final stop
    let li = s.rem - sT(i)
    let tp = 'stop'

    // Earlier departure for optional stop?
    if (c.optOn && !s._od && s.rem > fT(i)) {
      const lo = (s.rem - fT(i)) - c.travel
      if (lo < li) { li = lo; tp = 'opt' }
    }

    cands.push({li, tp, i, name: c.name, rem: s.rem})
  }

  for (let i = 0; i < numA; i++) {
    cands.push({li: AS[i].rem - AC[i].travel, tp: 'auto', i, name: AC[i].name, rem: AS[i].rem})
  }

  if (cands.length === 0) {
    setRec('rec-idle', '次のアクション', '起動ボタンを押してください', '', null)
    return
  }

  cands.sort((a, b) => a.li - b.li)
  const best = cands[0]
  const next = cands[1]
  const nextTxt = next ? `  次: ${next.name} (${fmt(next.li)}後)` : ''

  const destLabel = best.tp === 'opt'  ? 'エアブロー準備'
                  : best.tp === 'auto' ? '確認'
                  : '脱着'

  const target = {type: best.tp === 'auto' ? 'a' : 'm', i: best.i}
  const mainTxt = best.name + ' → ' + destLabel

  if (best.li <= 0) {
    setRec('rec-red', '🔴 今すぐ移動', mainTxt, nextTxt, target)
  } else if (best.li <= 30) {
    setRec('rec-yellow', '🟡 あと ' + fmt(best.li) + ' で移動', mainTxt, nextTxt, target)
  } else {
    setRec('rec-green', '⏱ あと ' + fmt(best.li) + ' で移動', mainTxt, nextTxt, target)
  }
}

// ── Tick (200ms) ──────────────────────────────────────────
function tick() {
  const now = Date.now()
  const dt  = (now - last) / 1000
  last = now

  for (let i = 0; i < numM; i++) {
    const s = MS[i], c = MC[i]

    if (s.state === 'running' || s.state === 'alert') {
      s.rem = Math.max(0, s.rem - dt)
    }

    if ((s.state === 'running' || s.state === 'alert') && s.rem <= 0) {
      s.state = 'ready'
    } else if (s.state === 'running' && c.optOn && !s._od && s.rem <= fT(i)) {
      s.state = 'opt_pause'
      s._od = true
    } else if (s.state === 'running' && s.rem <= sT(i)) {
      s.state = 'alert'
    }

    applyCard(i)
  }

  for (let i = 0; i < numA; i++) {
    AS[i].rem = Math.max(0, AS[i].rem - dt)
    applyAutoCard(i)
  }

  updateRec()
}

// ── Reset all ─────────────────────────────────────────────
function resetAll() {
  for (let i = 0; i < numM; i++) {
    MS[i].state = 'idle'
    MS[i].rem   = rT(i)
    MS[i]._od   = false
    prevSt[i]   = ''
    applyCard(i)
  }
  for (let i = 0; i < numA; i++) {
    AS[i].rem = AC[i].intMin * 60
    applyAutoCard(i)
  }
  updateRec()
}

// ── Multi-device sync (Engine + Viewer) ──────────────────
function getRole() { return localStorage.getItem('tm_role') }
function setRole(r) { localStorage.setItem('tm_role', r); location.reload() }
function clearRole() { localStorage.removeItem('tm_role'); location.reload() }

function setConn(on) {
  const b = document.getElementById('connBadge')
  b.style.display = 'block'
  b.textContent = on ? '● オンライン' : '● オフライン'
  b.className = on ? 'on' : 'off'
}

function pushSnapshot() {
  if (!db) return
  const machines = []
  for (let i = 0; i < numM; i++) {
    const s = MS[i], c = MC[i]
    const [bl, bc] = BADGE[s.state] || ['', '']
    machines.push({
      name: c.name, state: s.state,
      rem: s.rem, full: rT(i),
      badgeLabel: bl, badgeClass: bc
    })
  }
  const autos = []
  for (let i = 0; i < numA; i++) {
    autos.push({name: AC[i].name, rem: AS[i].rem, total: AC[i].intMin * 60})
  }
  db.ref('timer/snapshot').set({ts: Date.now(), numM, numA, machines, autos, rec: lastRec})
}

function startActionListener() {
  if (!db) return
  db.ref('timer/actions').on('child_added', snap => {
    const a = snap.val()
    if (a) {
      if (a.type === 'start' && a.i >= 0 && a.i < numM) doStart(a.i)
      else if (a.type === 'check' && a.i >= 0 && a.i < numA) doCheck(a.i)
    }
    snap.ref.remove()
  })
}

function initEngine() {
  document.getElementById('engineView').style.display = ''
  document.getElementById('viewerView').style.display = 'none'
  document.getElementById('roleGate').style.display = 'none'

  buildCards()
  buildAutoCards()
  updateRec()
  setInterval(tick, 200)

  if (db) {
    pushSnapshot()
    setInterval(pushSnapshot, 1000)
    startActionListener()
    db.ref('.info/connected').on('value', snap => setConn(!!snap.val()))
    if (navigator.wakeLock) {
      navigator.wakeLock.request('screen').catch(() => {})
    }
  }
}

function showRoleGate() {
  document.getElementById('engineView').style.display = 'none'
  document.getElementById('viewerView').style.display = 'none'
  const gate = document.getElementById('roleGate')
  gate.style.display = 'flex'
  const grid = document.getElementById('roleGrid')
  grid.innerHTML = ''

  const build = d => {
    d = d || {}
    const nM = d.numM || numM
    const nA = (d.numA != null) ? d.numA : numA
    const mNames = d.machines ? d.machines.map(m => m.name) : MC.slice(0, nM).map(m => m.name)
    const aNames = d.autos ? d.autos.map(a => a.name) : AC.slice(0, nA).map(a => a.name)

    for (let i = 0; i < nM; i++) {
      const b = document.createElement('button')
      b.className = 'roleBtn'
      b.textContent = mNames[i] || `機械${i + 1}`
      b.onclick = () => setRole('m' + i)
      grid.appendChild(b)
    }
    for (let i = 0; i < nA; i++) {
      const b = document.createElement('button')
      b.className = 'roleBtn'
      b.textContent = aNames[i] || `自動機${i + 1}`
      b.onclick = () => setRole('a' + i)
      grid.appendChild(b)
    }
    const eb = document.createElement('button')
    eb.className = 'roleBtn engineBtn'
    eb.textContent = '🖥 ダッシュボード（設定・全体表示）'
    eb.onclick = () => setRole('engine')
    grid.appendChild(eb)
  }

  if (db) {
    db.ref('timer/snapshot').once('value').then(snap => build(snap.val())).catch(() => build(null))
  } else {
    build(null)
  }
}

function sendAction(type, i) {
  if (!db) return
  db.ref('timer/actions').push({type, i, ts: Date.now()})
}

function renderViewer(d, isAuto, idx) {
  const wrap = document.getElementById('vWrap')
  const m = isAuto ? d.autos[idx] : d.machines[idx]
  if (!m) return

  document.getElementById('v-name').textContent = m.name
  const ba = document.getElementById('v-btn')

  if (isAuto) {
    const isDue = m.rem <= 0
    wrap.className = isDue ? 'st-alert' : 'st-running'
    document.getElementById('v-timer').textContent = isDue ? '確認してください' : fmt(m.rem)
    const badge = document.getElementById('v-badge')
    badge.textContent = isDue ? '要確認!' : '次回確認まで'
    badge.className = 'card-badge ' + (isDue ? 'b-alert' : 'b-running')
    document.getElementById('v-bar').style.width = Math.min(100, Math.max(0, (1 - m.rem / m.total) * 100)) + '%'
    ba.innerHTML = `<button class="btn ${isDue ? 'btn-restart' : 'btn-go'}" onclick="sendAction('check', ${idx})">確認完了</button>`
  } else {
    wrap.className = 'st-' + m.state
    document.getElementById('v-timer').textContent = (m.state === 'idle') ? '--:--' : fmt(m.rem)
    const badge = document.getElementById('v-badge')
    badge.textContent = m.badgeLabel
    badge.className = 'card-badge ' + m.badgeClass
    const pct = (m.state === 'idle') ? 0 : (m.rem / m.full) * 100
    document.getElementById('v-bar').style.width = Math.max(0, Math.min(100, pct)) + '%'

    if (m.state === 'idle') {
      ba.innerHTML = `<button class="btn btn-go" onclick="sendAction('start', ${idx})">起動</button>`
    } else if (m.state === 'running' || m.state === 'alert') {
      ba.innerHTML = `<button class="btn btn-dis" disabled>加工中</button>`
    } else if (m.state === 'opt_pause') {
      ba.innerHTML = `<button class="btn btn-resume" onclick="sendAction('start', ${idx})">起動（仕上げ再開）</button>`
    } else if (m.state === 'ready') {
      ba.innerHTML = `<button class="btn btn-restart" onclick="sendAction('start', ${idx})">起動（脱着完了後）</button>`
    }
  }

  // Global recommendation
  const rec = d.rec || {}
  const vrec = document.getElementById('vrec')
  const isYou = !!(rec.target && rec.target.type === (isAuto ? 'a' : 'm') && rec.target.i === idx)
  vrec.className = 'recbox ' + (rec.cls || 'rec-idle') + (isYou ? ' you' : '')
  document.getElementById('vrec-eyebrow').textContent = rec.eyebrow || ''
  document.getElementById('vrec-main').textContent = (isYou ? '👉 ' : '') + (rec.main || '')
  document.getElementById('vrec-sub').textContent = rec.sub || ''
}

function initViewer(role) {
  document.getElementById('engineView').style.display = 'none'
  document.getElementById('roleGate').style.display = 'none'
  document.getElementById('viewerView').style.display = ''

  if (!db) {
    document.getElementById('v-noFb').style.display = 'block'
    document.getElementById('v-noFb').textContent = 'クラウド連携が未設定のため、この端末では機械の状況を表示できません。設定担当者にご確認ください。'
    return
  }

  const isAuto = role[0] === 'a'
  const idx = parseInt(role.slice(1), 10)

  db.ref('timer/snapshot').on('value', snap => {
    const d = snap.val()
    if (!d) return
    renderViewer(d, isAuto, idx)
  })
  db.ref('.info/connected').on('value', snap => setConn(!!snap.val()))
}

// ── Init ──────────────────────────────────────────────────
function loadScript(src, timeout) {
  return new Promise((resolve, reject) => {
    let done = false
    const finish = fn => { if (!done) { done = true; fn() } }
    const s = document.createElement('script')
    s.src = src
    s.onload = () => finish(resolve)
    s.onerror = () => finish(() => reject(new Error('load failed: ' + src)))
    setTimeout(() => finish(() => reject(new Error('timeout: ' + src))), timeout || 8000)
    document.head.appendChild(s)
  })
}

async function boot() {
  if (FB_ENABLED) {
    try {
      await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js')
      await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js')
      firebase.initializeApp(FB_CONFIG)
      db = firebase.database()
    } catch (e) {
      console.error('Firebase load failed', e)
      db = null
    }
  }

  if (!db) {
    initEngine()
  } else {
    const role = getRole()
    if (role === 'engine') initEngine()
    else if (role) initViewer(role)
    else showRoleGate()
  }
}

boot()
</script>
